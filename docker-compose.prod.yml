# Production-like stack: PostgreSQL + API + Nginx frontend
# Usage: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goalsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-goalsync}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-goalsync}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-goalsync}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-goalsync}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${JWT_SECRET}}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      APP_URL: ${APP_URL:-http://localhost}
      RUN_PRISMA_PUSH: ${RUN_PRISMA_PUSH:-true}
      ESCALATION_CRON_ENABLED: ${ESCALATION_CRON_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '5000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - backend

volumes:
  postgres-prod-data:
